    #hero-static .heroContainer {

    #hero-static .heroOverlay {

    }
    [data-theme="dark"] #hero-static .heroOverlay {

    }
    #hero-static .heroInner { position: relative; z-index: 2; width: 100%; max-width: 72rem; margin: 0 auto; }
    #hero-static .heroContent { display: flex; flex-direction: column; align-items: flex-start; max-width: 680px; }
    #hero-static .heroEyebrow {
      font-size: 0.875rem; font-weight: 600; color: #1e3a5f; text-transform: uppercase;
      letter-spacing: 0.12em; margin-bottom: 1rem;
    }
    [data-theme="dark"] #hero-static .heroEyebrow { color: #7ba3d4; }
    #hero-static .heroDisplay {
      font-size: clamp(1.875rem, 4vw, 3rem); font-weight: 700; line-height: 1.2;
      color: #0f172a; letter-spacing: -0.02em; margin: 0 0 1rem;
    }
    [data-theme="dark"] #hero-static .heroDisplay { color: #f1f5f9; }
    #hero-static .heroSubtext { font-size: 1.125rem; color: #475569; line-height: 1.375; margin: 0; max-width: 42ch; }
    [data-theme="dark"] #hero-static .heroSubtext { color: #94a3b8; }
    @media (max-width: 768px) {

      #hero-static .heroContent { align-items: center; text-align: center; max-width: none; }
      #hero-static .heroSubtext { max-width: none; }
    }
